services:
  broker:
    image: redis:7.4.2
    container_name: paperless-ngx-redis
    restart: unless-stopped
    networks:
      - paperless
    volumes:
      - /volume2/docker/paperless-ngx/redis:/data
      
  db:
    image: postgres:17.4
    container_name: paperless-ngx-db
    restart: unless-stopped
    networks:
      - paperless
    volumes:
      - /volume2/docker/paperless-ngx/db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: paperlessdb
      POSTGRES_USER: david.marotzke@hotmail.com
      POSTGRES_PASSWORD: sXh7RoPkAvf5g1E

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.14.7
    container_name: paperless-ngx
    restart: unless-stopped
    networks:
      - paperless
    depends_on:
      - db
      - broker
      - gotenberg
      - tika
    ports:
      - "8000:8000"
    volumes:
      - /volume2/docker/paperless-ngx/data:/usr/src/paperless/data
      - /volume1/paperless-data/media:/usr/src/paperless/media
      - /volume1/paperless-data/export:/usr/src/paperless/export
      - /volume2/docker/paperless-ngx/consume:/usr/src/paperless/consume
    env_file: docker-compose.env
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: db
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
      
  gotenberg:
    image: docker.io/gotenberg/gotenberg:8
    container_name: paperless-ngx-gotenberg
    restart: unless-stopped
    networks:
      - paperless
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"

  tika:
    image: docker.io/apache/tika:2.9.2.1
    container_name: paperless-ngx-tika
    restart: unless-stopped
    networks:
      - paperless

  # ===== NEU: Paperless-AI für KI-basierte Dokumentensuche =====
  paperless-ai:
    image: ghcr.io/clusterzx/paperless-ai:latest
    container_name: paperless-ai
    restart: unless-stopped
    networks:
      - paperless
    ports:
      - "3747:3000"
    depends_on:
      - webserver
    environment:
      # Paperless Connection (intern im Docker-Netzwerk)
      - PAPERLESS_API_URL=http://webserver:8000
      - PAPERLESS_API_TOKEN=ad92cb61768153ca135cb910542a10cb21782e39
      
      # Ollama auf dem Laptop (extern)
      - OLLAMA_API_URL=http://192.168.188.130:11434
      - OLLAMA_MODEL=gemma2:2b
      
      # RAG Settings für semantische Dokumentensuche
      - RAG_ENABLED=true
      - AUTO_SCAN_ENABLED=true
      - SCAN_INTERVAL=60
      - EMBEDDING_MODEL=nomic-embed-text:latest
      
      # Logging
      - LOG_LEVEL=INFO
      
    volumes:
      - /volume2/docker/paperless-ai/data:/app/data

networks:
  paperless:
    driver: bridge